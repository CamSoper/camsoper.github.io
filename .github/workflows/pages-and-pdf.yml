name: Build site + résumé PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # to commit the PDF back
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Jekyll ---
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      # --- PDF (WeasyPrint) ---
      - name: Install WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev
          pip install weasyprint
      - name: Render résumé PDF
        run: python tools/build_pdf.py
      - name: Copy PDFs into the built site
        run: |
          mkdir -p _site/dist
          cp dist/*.pdf _site/dist/

      # --- Keep a copy of the PDF in the repo (optional, mirrors old behavior) ---
      - name: Commit PDF
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/cam_soper_resume.pdf dist/cam_soper_resume_ats.pdf
          git commit -m "Automated résumé PDF update" || echo "No changes to commit"
          git push || echo "Nothing to push"

      # --- Publish ---
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
